name: CI — Architecture & Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-architecture:
    name: Import Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Run import-linter
        run: |
          cd backend && lint-imports

  mypy-strict:
    name: mypy strict (new architecture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Run mypy on domain/ infra/ use_cases/
        run: |
          cd backend && python -m mypy \
            domain/ \
            infra/cache/ \
            infra/store/ \
            infra/llm/ \
            infra/data_source/__init__.py \
            use_cases/ \
            --config-file ../pyproject.toml

  lint-main-py:
    name: main.py < 200 lines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check main.py line count
        run: |
          python scripts/lint_main_py.py

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run smoke tests
        run: |
          cd backend && python -m pytest ../tests/test_skeleton_m1.py -v
