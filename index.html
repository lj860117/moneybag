<script>
// 注册 Service Worker（PWA 离线缓存 + 添加到桌面）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
  // v9.5.32: sw 激活新版本时自动刷新页面，避免 PWA 缓存导致用户看不到新功能
  let _swReloaded = false;
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'SW_UPDATED' && !_swReloaded) {
      _swReloaded = true;
      console.log('[SW] new version activated:', e.data.version, '→ reload in 800ms');
      setTimeout(() => location.reload(), 800);
    }
  });
}

// v9.5.89: 版本号心跳 — 每5分钟检测后端版本，发现新版自动提示刷新
(function(){
  const LOCAL_VER = '9.6.1';
  let _notified = false;
  async function checkVersion() {
    try {
      const r = await fetch('/api/health?_t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) return;
      const d = await r.json();
      const remoteVer = d.version || '';
      if (remoteVer && remoteVer !== LOCAL_VER && !_notified) {
        _notified = true;
        const banner = document.createElement('div');
        banner.id = '_versionUpdateBanner';
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(90deg,#5C6BC0,#3F51B5);color:#fff;padding:12px 16px;text-align:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.2)';
        banner.innerHTML = '✨ 钱袋子有新版本 v' + remoteVer + '（当前 v' + LOCAL_VER + '），点击立即更新 <button onclick="(async()=>{if(navigator.serviceWorker){const rs=await navigator.serviceWorker.getRegistrations();for(const r of rs){await r.unregister()}}if(window.caches){const ks=await caches.keys();for(const k of ks)await caches.delete(k)}location.reload(true)})()" style="margin-left:12px;padding:5px 14px;background:#fff;color:#3F51B5;border:none;border-radius:4px;font-weight:600;cursor:pointer">立即刷新 ↻</button> <span onclick="document.getElementById(\'_versionUpdateBanner\').remove()" style="margin-left:10px;cursor:pointer;opacity:0.7">✕</span>';
        document.body.appendChild(banner);
      }
    } catch(e) { /* 网络错误忽略 */ }
  }
  // 启动后 30s 首检 + 每 5 分钟轮询
  setTimeout(checkVersion, 30000);
  setInterval(checkVersion, 5 * 60 * 1000);
  // 标签页重新可见时也检测一次
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) checkVersion();
  });
})();
</script>
