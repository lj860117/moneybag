# MoneyBag — project configuration
# =================================
# M1 W4: mypy strict 配置（方案 C 落地）

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
explicit_package_bases = true
mypy_path = "backend"

# ---- 新架构层：strict 模式（方案 C 硬约束）----
# domain/  infra/  use_cases/  必须通过 strict 检查
# 老代码（services/ api/ main.py）暂不强制，绞杀者模式逐步迁移

[[tool.mypy.overrides]]
module = [
    "domain.*",
    "infra.cache.*",
    "infra.store.*",
    "infra.llm.*",
    "infra.data_source",
    "use_cases.*",
]
disallow_untyped_defs = true
disallow_any_generics = true
check_untyped_defs = true
warn_unreachable = true
strict_equality = true
no_implicit_optional = true

# ---- 老代码：宽松模式（绞杀者过渡）----
[[tool.mypy.overrides]]
module = [
    "services.*",
    "api.*",
]
ignore_errors = true

# ---- RAG/知识库层：逐步收紧，现阶段宽松（chromadb/sentence_transformers 无 stub）----
# infra.knowledge 依赖 chromadb/sentence_transformers，无官方 stub，暂不强制
# domain.rule_engine.decision_archive / domain.services.user_preference_service 历史遗留泛型注解
[[tool.mypy.overrides]]
module = [
    "infra.knowledge",
    "infra.knowledge.*",
    "infra.events",
    "infra.events.*",
    "infra.data_source.import_",
    "infra.data_source.import_.*",
    "domain.rule_engine.decision_archive",
    "domain.services.user_preference_service",
]
ignore_errors = true

# ---- 第三方库：忽略缺失 stub ----
[[tool.mypy.overrides]]
module = [
    "akshare",
    "akshare.*",
    "tushare",
    "tushare.*",
    "baostock",
    "baostock.*",
    "fastapi",
    "fastapi.*",
    "uvicorn",
    "uvicorn.*",
    "pydantic",
    "pydantic.*",
    "httpx",
    "httpx.*",
    "PIL",
    "PIL.*",
    "chromadb",
    "chromadb.*",
    "sentence_transformers",
    "sentence_transformers.*",
    "zhdate",
    "zhdate.*",
    "pandas",
    "pandas.*",
    "chardet",
    "chardet.*",
]
ignore_missing_imports = true
